---
name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Fetch shared justfiles
        run: just fetch
      - name: Build
        run: go build -o tlock .
      - name: Test (fmt + lint + race tests)
        run: just test
